services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd_lanzamientos_app
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: rd_lanzamientos_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: rd_lanzamientos_mysql
    environment:
      MYSQL_DATABASE: rd_lanzamientos
      MYSQL_USER: rd_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: rd_lanzamientos_redis
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd_lanzamientos_queue
    command: php artisan queue:work --tries=3
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd_lanzamientos_scheduler
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app

volumes:
  mysql_data:
